<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System - Monthly Fees</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .container { margin-top: 30px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .paid { color: green; font-weight: bold; }
        .unpaid { color: red; font-weight: bold; }
        .table-responsive { background: white; padding: 20px; border-radius: 8px; }
        .fees-summary { font-size: 0.85rem; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">🏫 Student Management System</h2>

    <!-- Controls Section -->
    <div class="card p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Select Class</label>
                <select id="classSelect" class="form-select" onchange="filterData()">
                    <option value="all">All Classes</option>
                    <option value="1">Class 1</option>
                    <option value="2">Class 2</option>
                    <option value="3">Class 3</option>
                    <option value="4">Class 4</option>
                    <option value="5">Class 5</option>
                    <option value="6">Class 6</option>
                    <option value="7">Class 7</option>
                    <option value="8">Class 8</option>
                    <option value="9">Class 9</option>
                    <option value="10">Class 10</option>
                    <option value="11">Class 11</option>
                    <option value="12">Class 12</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">🔍 Search Student</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Name, Father, Mobile..." onkeyup="searchData()">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addStudentModal">+ Add Student</button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>S.No</th>
                    <th>Class</th>
                    <th>Student Name</th>
                    <th>Father's Name</th>
                    <th>Mobile No.</th>
                    <th>Fees Status (Jan-Dec)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <!-- Data will come here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add Student Modal -->
<div class="modal fade" id="addStudentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <div class="mb-2">
                        <label>Class</label>
                        <select id="sClass" class="form-select" required>
                            <option value="1">Class 1</option>
                            <option value="2">Class 2</option>
                            <option value="3">Class 3</option>
                            <option value="4">Class 4</option>
                            <option value="5">Class 5</option>
                            <option value="6">Class 6</option>
                            <option value="7">Class 7</option>
                            <option value="8">Class 8</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Student Name</label>
                        <input type="text" id="sName" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label>Father's Name</label>
                        <input type="text" id="sFather" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label>Mobile No.</label>
                        <input type="number" id="sMobile" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-3">Save Student</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Monthly Fees Update Modal -->
<div class="modal fade" id="feesModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Monthly Fees</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="feesStudentName" class="fw-bold"></p>
                <form id="feesForm">
                    <input type="hidden" id="feesStudentId">
                    <div class="mb-3">
                        <label>Select Month</label>
                        <select id="feesMonth" class="form-select">
                            <option value="Jan">January</option>
                            <option value="Feb">February</option>
                            <option value="Mar">March</option>
                            <option value="Apr">April</option>
                            <option value="May">May</option>
                            <option value="Jun">June</option>
                            <option value="Jul">July</option>
                            <option value="Aug">August</option>
                            <option value="Sep">September</option>
                            <option value="Oct">October</option>
                            <option value="Nov">November</option>
                            <option value="Dec">December</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Status</label>
                        <select id="feesStatus" class="form-select">
                            <option value="Paid">Paid ✅</option>
                            <option value="Unpaid">Unpaid ❌</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Fees</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Logic Script -->
<script>
    // Initialize data from LocalStorage or empty array
    let students = JSON.parse(localStorage.getItem('students')) || [];

    // Function to Render Table
    function renderTable(data) {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No students found</td></tr>';
            return;
        }

        data.forEach((student, index) => {
            // Generate Fees Summary String
            let feesSummary = "";
            for (const [month, status] of Object.entries(student.fees)) {
                feesSummary += `${month}: <span class="${status === 'Paid' ? 'paid' : 'unpaid'}">${status}</span>, `;
            }
            feesSummary = feesSummary.slice(0, -2); // Remove last comma

            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>Class ${student.class}</td>
                    <td>${student.name}</td>
                    <td>${student.father}</td>
                    <td>${student.mobile}</td>
                    <td class="fees-summary" title="${feesSummary}">${feesSummary}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="openFeesModal(${student.id})">Fees</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStudent(${student.id})">Delete</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // Add Student Function
    document.getElementById('addForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Initialize fees for all months as Unpaid
        const initialFees = {
            "Jan": "Unpaid", "Feb": "Unpaid", "Mar": "Unpaid", "Apr": "Unpaid",
            "May": "Unpaid", "Jun": "Unpaid", "Jul": "Unpaid", "Aug": "Unpaid",
            "Sep": "Unpaid", "Oct": "Unpaid", "Nov": "Unpaid", "Dec": "Unpaid"
        };

        const newStudent = {
            id: Date.now(),
            class: document.getElementById('sClass').value,
            name: document.getElementById('sName').value,
            father: document.getElementById('sFather').value,
            mobile: document.getElementById('sMobile').value,
            fees: initialFees
        };

        students.push(newStudent);
        localStorage.setItem('students', JSON.stringify(students));
        
        this.reset();
        const modal = bootstrap.Modal.getInstance(document.getElementById('addStudentModal'));
        modal.hide();
        
        renderTable(students);
    });

    // Delete Student
    function deleteStudent(id) {
        if(confirm('Are you sure you want to delete this student?')) {
            students = students.filter(s => s.id !== id);
            localStorage.setItem('students', JSON.stringify(students));
            renderTable(students);
        }
    }

    // Open Fees Modal
    function openFeesModal(id) {
        const student = students.find(s => s.id === id);
        if(student) {
            document.getElementById('feesStudentName').innerText = student.name;
            document.getElementById('feesStudentId').value = id;
            const modal = new bootstrap.Modal(document.getElementById('feesModal'));
            modal.show();
        }
    }

    // Update Fees Function
    document.getElementById('feesForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const id = parseInt(document.getElementById('feesStudentId').value);
        const month = document.getElementById('feesMonth').value;
        const status = document.getElementById('feesStatus').value;

        const student = students.find(s => s.id === id);
        if(student) {
            student.fees[month] = status;
            localStorage.setItem('students', JSON.stringify(students));
            
            // Close modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('feesModal'));
            modal.hide();
            
            renderTable(students);
        }
    });

    // Filter by Class
    function filterData() {
        const classVal = document.getElementById('classSelect').value;
        if (classVal === 'all') {
            renderTable(students);
        } else {
            const filtered = students.filter(s => s.class == classVal);
            renderTable(filtered);
        }
    }

    // Search Function
    function searchData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = students.filter(s => 
            s.name.toLowerCase().includes(query) || 
            s.father.toLowerCase().includes(query) || 
            s.mobile.includes(query)
        );
        renderTable(filtered);
    }

    // Initial Load
    renderTable(students);
</script>

</body>
</html>
